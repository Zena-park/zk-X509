# Builds the terminal prover (`interactive`) wrapped in a hand-rolled
# .app and ships it as a zip.
#
# NOT triggered by tags. desktop.yml supersedes this for releases: it
# builds the Tauri GUI app that the download page points at. Both used to
# fire on `v*` and both publish with action-gh-release, so a single tag
# attached four assets to one release — two DMGs (GUI) and two zips
# (terminal) — with nothing on the release explaining which to pick.
#
# Kept on manual dispatch because the terminal build is still useful for
# headless/CI proving, where a GUI app is the wrong shape.
name: Release Desktop App

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  APP_NAME: zk-X509
  SP1_VERSION: "v6.0.2"

jobs:
  # ── Step 1: Build ELF once on Linux (canonical source of truth) ──
  build-elf:
    runs-on: ubuntu-latest
    name: Build SP1 ELF
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - name: Install SP1 toolchain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L https://sp1up.succinct.xyz | bash
          ~/.sp1/bin/sp1up --version ${{ env.SP1_VERSION }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: elf-build

      - name: Build ELF
        run: cargo build --release --bin vkey

      - name: Extract vkey
        id: vkey
        run: |
          VKEY=$(cargo run --release --bin vkey 2>/dev/null | grep -oE '0x[0-9a-fA-F]{64}' | head -1)
          if [ -z "$VKEY" ]; then
            echo "::error::vkey extraction failed: no 0x-prefixed 64-char hex value found"
            exit 1
          fi
          MATCH_COUNT=$(cargo run --release --bin vkey 2>/dev/null | grep -oEc '0x[0-9a-fA-F]{64}')
          if [ "$MATCH_COUNT" -ne 1 ]; then
            echo "::error::vkey extraction ambiguous: expected 1 match, got $MATCH_COUNT"
            exit 1
          fi
          echo "vkey=$VKEY" >> "$GITHUB_OUTPUT"
          echo "## Program Verification Key" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$VKEY" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$VKEY" > vkey.txt

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: sp1-elf
          path: target/elf-compilation/riscv64im-succinct-zkvm-elf/release/zk-x509-program

      - name: Upload vkey
        uses: actions/upload-artifact@v4
        with:
          name: vkey
          path: vkey.txt

  # ── Step 2: Build platform binaries using the same ELF ──
  build:
    needs: build-elf
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure Rust target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Download pre-built ELF
        uses: actions/download-artifact@v4
        with:
          name: sp1-elf
          path: elf

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        env:
          PREBUILT_ELF: ${{ github.workspace }}/elf/zk-x509-program
        run: cargo build --release --bin interactive --target ${{ matrix.target }}

      - name: Create .app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_DIR="dist/${{ env.APP_NAME }}.app"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          APP_VERSION="${GITHUB_REF_NAME#v}"
          cp script/app-resources/Info.plist "$APP_DIR/Contents/"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" "$APP_DIR/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $APP_VERSION" "$APP_DIR/Contents/Info.plist"

          cp "target/${{ matrix.target }}/release/interactive" "$APP_DIR/Contents/MacOS/interactive"
          cp script/app-resources/launcher.sh "$APP_DIR/Contents/MacOS/launcher"
          chmod +x "$APP_DIR/Contents/MacOS/launcher"

          if [ -f script/app-resources/AppIcon.icns ]; then
            cp script/app-resources/AppIcon.icns "$APP_DIR/Contents/Resources/"
          fi

          if ls data/ca-certs-* >/dev/null 2>&1; then
            mkdir -p "$APP_DIR/Contents/Resources/ca-certs"
            for dir in data/ca-certs-*; do
              [ -d "$dir" ] || continue
              for cert in "$dir"/*.der; do
                [ -f "$cert" ] || continue
                cp "$cert" "$APP_DIR/Contents/Resources/ca-certs/"
              done
            done
          fi

      - name: Import Apple certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Sign app (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_DIR="dist/${{ env.APP_NAME }}.app"
          codesign --deep --force --options runtime \
            --entitlements script/app-resources/entitlements.plist \
            -s "$APPLE_SIGNING_IDENTITY" "$APP_DIR"
          echo "Signed with: $APPLE_SIGNING_IDENTITY"

      - name: Notarize app (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_DIR="dist/${{ env.APP_NAME }}.app"
          ARCH="${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x64' }}"
          ZIP_NAME="${{ env.APP_NAME }}-mac-${ARCH}.zip"

          ditto -c -k --keepParent "$APP_DIR" "$ZIP_NAME"

          xcrun notarytool submit "$ZIP_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_DIR"

          rm "$ZIP_NAME"
          ditto -c -k --keepParent "$APP_DIR" "$ZIP_NAME"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/interactive.exe" "dist/${{ env.APP_NAME }}.exe"
          cd dist && 7z a "../${{ env.APP_NAME }}-win-x64.zip" "${{ env.APP_NAME }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.label }}
          path: "*.zip"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-*
          merge-multiple: true

      - name: Download vkey
        uses: actions/download-artifact@v4
        with:
          name: vkey

      - name: Read vkey
        id: vkey
        run: echo "value=$(cat vkey.txt)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          append_body: true
          body: |

            ---

            ## Program Verification Key (vkey)

            ```
            ${{ steps.vkey.outputs.value }}
            ```

            > **Important:** Update RegistryFactory's vkey with this value before users download this release.
            > See [Deployment Guide](docs/development/deployment-guide.md#6-release-based-deployment-workflow) for details.
          generate_release_notes: true
