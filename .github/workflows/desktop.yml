name: Desktop App Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SP1_VERSION: "v6.0.2"

jobs:
  # ── Step 1: Build ELF on Linux ──
  build-elf:
    runs-on: ubuntu-latest
    name: Build SP1 ELF
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - name: Install SP1 toolchain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL https://sp1up.succinct.xyz -o /tmp/sp1up-install.sh
          bash /tmp/sp1up-install.sh
          ~/.sp1/bin/sp1up --version ${{ env.SP1_VERSION }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: elf-build

      - name: Build ELF
        run: |
          # Remove desktop workspace member (not checked out in ELF build).
          # cargo -p cannot skip workspace resolution, so sed is required.
          sed -i 's/, "desktop\/src-tauri"//' Cargo.toml
          cargo build --release --bin vkey

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: sp1-elf
          path: target/elf-compilation/riscv64im-succinct-zkvm-elf/release/zk-x509-program

  # ── Step 2: Build Tauri desktop app ──
  build-desktop:
    needs: build-elf
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64

    runs-on: ${{ matrix.platform }}
    name: Desktop (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download pre-built ELF
        uses: actions/download-artifact@v4
        with:
          name: sp1-elf
          path: elf

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Build Tauri app
        working-directory: desktop
        env:
          PREBUILT_ELF: ${{ github.workspace }}/elf/zk-x509-program
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$DMG"
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: zk-X509-Desktop-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  # ── Step 3: Create release (tag push only) ──
  release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: zk-X509-Desktop-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*.dmg"
          append_body: true
          body: |

            ---

            ## Desktop App

            Download the DMG for your platform and drag to Applications.
            Requires macOS 12.0+.
          generate_release_notes: true
