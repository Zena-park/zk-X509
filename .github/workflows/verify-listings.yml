name: Verify Built-with listings

# Ensures every owned project listing carries a valid owner signature, so an
# edit to someone else's listing cannot be merged without their wallet re-signing.
on:
  pull_request:
    paths:
      - "frontend/app/built-with/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run app/built-with/listings.test.ts
