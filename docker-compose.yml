services:
  anvil:
    image: ghcr.io/foundry-rs/foundry@sha256:9e591221051112fe0bb530abcaba67f43f01ebbd12a94a8632d570d5e065a8bf
    entrypoint: ["anvil", "--host", "0.0.0.0"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10

  vkey-init:
    build:
      context: .
      dockerfile: script/Dockerfile
    image: zk-x509-prover:local
    volumes:
      - deployer-output:/shared
    entrypoint: ["sh", "-c", "VKEY=$$(vkey | grep -oE '0x[0-9a-fA-F]{64}' | head -1) && if [ -z \"$$VKEY\" ] || [ $${#VKEY} -ne 66 ]; then echo 'ERROR: vkey extraction failed' >&2; exit 1; fi && echo \"$$VKEY\" > /shared/vkey.txt && echo \"VKEY=$$VKEY\""]

  deployer:
    image: ghcr.io/foundry-rs/foundry@sha256:9e591221051112fe0bb530abcaba67f43f01ebbd12a94a8632d570d5e065a8bf
    user: root
    depends_on:
      anvil: { condition: service_healthy }
      vkey-init: { condition: service_completed_successfully }
    volumes:
      - ./contracts:/contracts
      - ./scripts:/scripts:ro
      - deployer-output:/shared
    working_dir: /contracts
    entrypoint: ["sh", "/scripts/deploy-local.sh"]

  backend:
    build: ./backend
    depends_on:
      deployer: { condition: service_completed_successfully }
    ports:
      - "4000:4000"
    volumes:
      - deployer-output:/shared:ro
    environment:
      - PORT=4000
      - CORS_ORIGIN=http://localhost:3000
      - RPC_URL=http://anvil:8545

  prover:
    image: zk-x509-prover:local
    depends_on:
      vkey-init: { condition: service_completed_successfully }
      deployer: { condition: service_completed_successfully }
    ports:
      - "9090:9090"
    volumes:
      - ./logs:/logs
      # NOTE: docker.sock is required for SP1 Groth16 proving (sp1-gnark container).
      # This grants host Docker access — use only in local/dev environments.
      # For production, use SP1 network proving or a dedicated proving cluster.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SP1_PROVER=local
      - PROVER_URL=http://localhost:9090
      - PROVER_PORT=9090
      - PROVER_LOG_DIR=/logs
      - RUST_LOG=info

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./scripts:/scripts:ro
      - deployer-output:/shared:ro
    entrypoint: ["sh", "/scripts/frontend-entrypoint.sh"]
    environment:
      - NEXT_PUBLIC_RPC_URL=http://localhost:8545
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
      - NEXT_PUBLIC_CHAIN_ID=31337

volumes:
  deployer-output:
